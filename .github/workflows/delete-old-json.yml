name: Delete old persona JSON files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Eliminar JSON viejos solo en public/data/personas
        shell: bash
        run: |
          set -e

          MAX_DAYS=60
          NOW=$(date +%s)

          echo "Buscando JSON en public/data/personas..."

          git ls-files 'public/data/personas/*.json' | while IFS= read -r file; do
            [ -z "$file" ] && continue

            LAST_COMMIT=$(git log -1 --format="%ct" -- "$file" || true)

            if [ -z "$LAST_COMMIT" ]; then
              echo "No se pudo leer commit de: $file"
              continue
            fi

            DIFF_DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))

            if [ "$DIFF_DAYS" -gt "$MAX_DAYS" ]; then
              echo "Eliminando $file ($DIFF_DAYS días)"
              git rm -f -- "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
          else
            git commit -m "cleanup: eliminar json viejos de public/data/personas"
            git push
          fi
